<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>クロマキー最適色ファインダー</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .preview-image {
            background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAAf8/9hAAAAAXNSR0IArs4c6QAAADFJREFUOE9jZGBgEGHADxihgMFBIxg1gDAAaWn5/x/DQJwGRsMoRhOOwzV0NNyIAwAAeNURkO3hXF0AAAAASUVORK5CYII=');
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-800 pb-20">

    <div class="max-w-4xl mx-auto p-6">
        <header class="text-center mb-10 mt-8">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">🎨 クロマキー最適色ファインダー</h1>
            <p class="text-gray-600">3DやLive2Dのテクスチャから、一番「使われていない色」を計算して提案します。</p>
        </header>

        <main class="space-y-8">
            <!-- ファイル入力エリア -->
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <h2 class="text-lg font-semibold mb-4">1. テクスチャ画像の読み込み</h2>
                <div id="dropZone" class="border-2 border-dashed border-gray-300 rounded-lg p-10 text-center hover:bg-gray-50 transition cursor-pointer relative">
                    <input type="file" id="fileInput" multiple accept="image/png, image/jpeg" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                    <svg class="mx-auto h-12 w-12 text-gray-400 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                    </svg>
                    <p class="text-gray-600 font-medium">ここに画像をドラッグ＆ドロップ</p>
                    <p class="text-gray-400 text-sm mt-1">またはクリックしてファイルを選択 (PNG, JPG)</p>
                </div>

                <!-- プレビューエリア -->
                <div id="previewContainer" class="mt-6 hidden">
                    <div class="flex justify-between items-end mb-3">
                        <h3 class="text-sm font-medium text-gray-700">読み込まれた画像 (<span id="imageCount">0</span>枚)</h3>
                        <button id="clearBtn" class="text-sm text-red-500 hover:text-red-700 font-medium">すべてクリア</button>
                    </div>
                    <div id="imageGrid" class="grid grid-cols-4 sm:grid-cols-6 md:grid-cols-8 gap-3 max-h-60 overflow-y-auto p-2 border border-gray-100 rounded bg-gray-50">
                        <!-- サムネイルがここに追加されます -->
                    </div>
                </div>
            </div>

            <!-- アクションエリア -->
            <div class="text-center">
                <button id="analyzeBtn" disabled class="bg-blue-600 hover:bg-blue-700 disabled:bg-gray-400 disabled:cursor-not-allowed text-white font-bold py-3 px-8 rounded-full shadow-lg transition transform active:scale-95 text-lg flex items-center justify-center mx-auto w-full md:w-auto">
                    <span id="btnText">最適色を計算する</span>
                    <svg id="loadingSpinner" class="animate-spin ml-2 h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
                <p id="progressText" class="text-sm text-gray-500 mt-2 hidden">解析中...</p>
            </div>

            <!-- 結果エリア -->
            <div id="resultArea" class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 hidden">
                <h2 class="text-lg font-semibold mb-6 text-center">💡 提案されたクロマキー背景色</h2>
                
                <div class="flex flex-col md:flex-row gap-8 items-center justify-center">
                    <!-- 色情報 -->
                    <div class="text-center flex flex-col items-center">
                        <div id="resultColorBox" class="w-32 h-32 rounded-lg shadow-inner border border-gray-200 mb-4 flex items-center justify-center transition-colors duration-500">
                            <span id="resultColorName" class="font-bold text-xl drop-shadow-md mix-blend-difference text-white"></span>
                        </div>
                        <div class="flex items-center space-x-2 bg-gray-100 p-2 rounded">
                            <code id="resultHexCode" class="text-lg font-mono text-gray-800">#000000</code>
                            <button id="copyBtn" class="text-gray-500 hover:text-gray-800 p-1" title="コピーする">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                            </button>
                        </div>
                    </div>

                    <!-- 適用プレビュー -->
                    <div class="flex-1 w-full max-w-md">
                        <p class="text-sm text-gray-500 mb-2 text-center md:text-left">背景適用イメージ (1枚目の画像)</p>
                        <div id="demoPreviewBox" class="w-full aspect-video rounded-lg shadow-inner flex items-center justify-center overflow-hidden border border-gray-200 relative transition-colors duration-500 preview-image">
                            <img id="demoPreviewImage" src="" alt="preview" class="max-w-full max-h-full object-contain relative z-10 drop-shadow-md">
                        </div>
                    </div>
                </div>
                
                <div class="mt-8 pt-6 border-t border-gray-100">
                    <h3 class="text-sm font-medium text-gray-700 mb-3">他の候補色（スコア順）</h3>
                    <div id="otherCandidates" class="flex flex-wrap gap-2 justify-center">
                        <!-- 他の候補がここに追加されます -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 非表示のCanvas (画像解析用) -->
    <canvas id="calcCanvas" class="hidden"></canvas>

    <script>
        // DOM要素の取得
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const previewContainer = document.getElementById('previewContainer');
        const imageGrid = document.getElementById('imageGrid');
        const imageCountDisplay = document.getElementById('imageCount');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const clearBtn = document.getElementById('clearBtn');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const btnText = document.getElementById('btnText');
        const progressText = document.getElementById('progressText');
        const resultArea = document.getElementById('resultArea');
        
        // 結果表示用のDOM要素
        const resultColorBox = document.getElementById('resultColorBox');
        const resultColorName = document.getElementById('resultColorName');
        const resultHexCode = document.getElementById('resultHexCode');
        const demoPreviewBox = document.getElementById('demoPreviewBox');
        const demoPreviewImage = document.getElementById('demoPreviewImage');
        const copyBtn = document.getElementById('copyBtn');
        const otherCandidates = document.getElementById('otherCandidates');
        const calcCanvas = document.getElementById('calcCanvas');
        const ctx = calcCanvas.getContext('2d', { willReadFrequently: true });

        // 状態管理
        let loadedImages = [];
        let firstImageUrl = null;

        // --- 候補となるクロマキー色のリスト ---
        const candidateColors = [
            { name: 'グリーン', rgb: [0, 255, 0], hex: '#00FF00' },
            { name: 'ブルー', rgb: [0, 0, 255], hex: '#0000FF' },
            { name: 'マゼンタ', rgb: [255, 0, 255], hex: '#FF00FF' },
            { name: 'シアン', rgb: [0, 255, 255], hex: '#00FFFF' },
            { name: 'レッド', rgb: [255, 0, 0], hex: '#FF0000' },
            { name: 'イエロー', rgb: [255, 255, 0], hex: '#FFFF00' },
            { name: 'グレー (50%)', rgb: [128, 128, 128], hex: '#808080' },
            { name: 'ホワイト', rgb: [255, 255, 255], hex: '#FFFFFF' },
            { name: 'ブラック', rgb: [0, 0, 0], hex: '#000000' }
        ];

        // --- イベントリスナー ---

        // ファイル選択
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

        // ドラッグ＆ドロップ
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('bg-blue-50', 'border-blue-400');
        });
        
        dropZone.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dropZone.classList.remove('bg-blue-50', 'border-blue-400');
        });
        
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('bg-blue-50', 'border-blue-400');
            handleFiles(e.dataTransfer.files);
        });

        // クリアボタン
        clearBtn.addEventListener('click', () => {
            loadedImages = [];
            firstImageUrl = null;
            imageGrid.innerHTML = '';
            previewContainer.classList.add('hidden');
            resultArea.classList.add('hidden');
            updateUIState();
        });

        // コピーボタン
        copyBtn.addEventListener('click', () => {
            const hex = resultHexCode.textContent;
            navigator.clipboard.writeText(hex).then(() => {
                const originalBg = copyBtn.innerHTML;
                copyBtn.innerHTML = '<svg class="w-5 h-5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>';
                setTimeout(() => { copyBtn.innerHTML = originalBg; }, 2000);
            });
        });

        // 解析ボタン
        analyzeBtn.addEventListener('click', startAnalysis);


        // --- コアロジック ---

        // 画像の読み込み処理
        function handleFiles(files) {
            const imageFiles = Array.from(files).filter(file => file.type.startsWith('image/'));
            if (imageFiles.length === 0) return;

            let loadedCount = 0;
            previewContainer.classList.remove('hidden');

            imageFiles.forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        loadedImages.push(img);
                        
                        // 最初の画像をプレビュー用に保持
                        if (!firstImageUrl) {
                            firstImageUrl = e.target.result;
                            demoPreviewImage.src = firstImageUrl;
                        }

                        // サムネイル作成
                        const thumbDiv = document.createElement('div');
                        thumbDiv.className = 'aspect-square rounded border border-gray-200 overflow-hidden bg-white preview-image';
                        const thumbImg = document.createElement('img');
                        thumbImg.src = e.target.result;
                        thumbImg.className = 'w-full h-full object-contain';
                        thumbDiv.appendChild(thumbImg);
                        imageGrid.appendChild(thumbDiv);

                        loadedCount++;
                        if (loadedCount === imageFiles.length) {
                            updateUIState();
                        }
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        function updateUIState() {
            imageCountDisplay.textContent = loadedImages.length;
            analyzeBtn.disabled = loadedImages.length === 0;
            
            // 新しい画像が追加されたら結果を隠す
            resultArea.classList.add('hidden');
        }

        // 解析の開始
        async function startAnalysis() {
            if (loadedImages.length === 0) return;

            // UIをローディング状態に
            analyzeBtn.disabled = true;
            loadingSpinner.classList.remove('hidden');
            btnText.textContent = '計算中...';
            progressText.classList.remove('hidden');
            progressText.textContent = 'ピクセルデータを解析しています...';
            resultArea.classList.add('hidden');

            // ブラウザがフリーズしないよう、処理を少し遅延させてUIを更新させる
            await new Promise(resolve => setTimeout(resolve, 50));

            try {
                // 各候補色の「最小距離（画像のどのピクセルからもこれ以上は離れている）」を計算
                // 距離の計算にはRGB空間でのユークリッド距離の2乗を使用（ルート計算を省いて高速化）
                
                // 候補色のスコア（最小距離）を初期化 (大きいほど良い)
                const scores = candidateColors.map(() => Infinity);

                for (let i = 0; i < loadedImages.length; i++) {
                    const img = loadedImages[i];
                    progressText.textContent = `画像 ${i + 1}/${loadedImages.length} を解析中...`;
                    await new Promise(resolve => setTimeout(resolve, 10)); // UI更新用

                    // 計算量削減のため、画像を縮小してCanvasに描画
                    const MAX_SIZE = 200; // このサイズに収まるように縮小
                    let w = img.width;
                    let h = img.height;
                    if (w > MAX_SIZE || h > MAX_SIZE) {
                        const ratio = Math.min(MAX_SIZE / w, MAX_SIZE / h);
                        w = Math.floor(w * ratio);
                        h = Math.floor(h * ratio);
                    }
                    
                    calcCanvas.width = w;
                    calcCanvas.height = h;
                    ctx.drawImage(img, 0, 0, w, h);
                    
                    const imageData = ctx.getImageData(0, 0, w, h).data;

                    // ピクセルごとに処理
                    for (let p = 0; p < imageData.length; p += 4) {
                        const r = imageData[p];
                        const g = imageData[p+1];
                        const b = imageData[p+2];
                        const a = imageData[p+3];

                        // 完全な透明ピクセルは無視
                        if (a === 0) continue; 

                        // 各候補色との距離を計算し、最小距離を更新
                        for (let c = 0; c < candidateColors.length; c++) {
                            const cr = candidateColors[c].rgb[0];
                            const cg = candidateColors[c].rgb[1];
                            const cb = candidateColors[c].rgb[2];
                            
                            // 距離の2乗
                            const distSq = (r - cr)**2 + (g - cg)**2 + (b - cb)**2;
                            
                            if (distSq < scores[c]) {
                                scores[c] = distSq;
                            }
                        }
                    }
                }

                // スコア（最小距離）を候補色オブジェクトに紐付け、降順にソート
                const results = candidateColors.map((color, idx) => ({
                    ...color,
                    score: scores[idx]
                })).sort((a, b) => b.score - a.score);

                // 結果の表示
                showResults(results);

            } catch (error) {
                console.error("解析エラー:", error);
                alert("画像の解析中にエラーが発生しました。");
            } finally {
                // UIを元に戻す
                analyzeBtn.disabled = false;
                loadingSpinner.classList.add('hidden');
                btnText.textContent = '最適色を再計算する';
                progressText.classList.add('hidden');
            }
        }

        // 結果を画面に反映
        function showResults(sortedResults) {
            const bestColor = sortedResults[0];

            // メイン結果の更新
            resultColorBox.style.backgroundColor = bestColor.hex;
            resultColorName.textContent = bestColor.name;
            resultHexCode.textContent = bestColor.hex;
            demoPreviewBox.style.backgroundColor = bestColor.hex;

            // 他の候補の表示
            otherCandidates.innerHTML = '';
            // 2位から5位くらいまでを表示
            for (let i = 1; i < Math.min(5, sortedResults.length); i++) {
                const color = sortedResults[i];
                
                const btn = document.createElement('button');
                btn.className = 'flex items-center space-x-2 bg-white border border-gray-200 rounded-full px-3 py-1 text-sm hover:bg-gray-50 transition';
                
                const dot = document.createElement('span');
                dot.className = 'w-3 h-3 rounded-full border border-gray-300';
                dot.style.backgroundColor = color.hex;
                
                const name = document.createElement('span');
                name.className = 'text-gray-600';
                name.textContent = color.name;
                
                btn.appendChild(dot);
                btn.appendChild(name);
                
                // クリックでプレビューを切り替え
                btn.addEventListener('click', () => {
                    resultColorBox.style.backgroundColor = color.hex;
                    resultColorName.textContent = color.name;
                    resultHexCode.textContent = color.hex;
                    demoPreviewBox.style.backgroundColor = color.hex;
                });
                
                otherCandidates.appendChild(btn);
            }

            resultArea.classList.remove('hidden');
            
            // 結果エリアまでスクロール
            resultArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
    </script>
</body>
</html>
